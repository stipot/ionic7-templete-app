<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Морской Бой </ion-title>
    <ion-buttons slot="end" *ngIf="!isPlacementMode && enableSuperPowers">
      <ion-button (click)="showPowersInfo()">
        <ion-icon name="flash"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <!-- Статус -->
  <div class="status-bar">
    <ion-chip [color]="isPlacementMode ? 'primary' : (isPlayerTurn ? 'success' : 'danger')" outline>
      <ion-icon [name]="isPlacementMode ? 'construct' : (isPlayerTurn ? 'boat' : 'skull')"></ion-icon>
      <ion-label>{{ statusMessage }}</ion-label>
    </ion-chip>
  </div>

  <!--  Панель суперспособностей игрока -->
  <div class="superpowers-panel" *ngIf="enableSuperPowers && !isPlacementMode && isPlayerTurn">
    <ion-label class="powers-label"> Ваши способности:</ion-label>
    <div class="powers-container">
      <ion-chip 
        *ngFor="let power of playerSuperPowers"
        [color]="power.available ? power.color : 'medium'"
        [class.disabled]="!power.available"
        (click)="power.available && activateSuperPower(power)"
        [title]="power.description"
      >
        <ion-icon [name]="power.icon"></ion-icon>
        <ion-label>{{ power.name }}</ion-label>
        <ion-badge *ngIf="!power.available" slot="end" color="light">✕</ion-badge>
      </ion-chip>
      <ion-chip *ngIf="playerSuperPowers.length === 0" color="medium" disabled>
        <ion-label>Нет способностей</ion-label>
      </ion-chip>
    </div>
  </div>

  <!-- Панель размещения -->
  <div class="placement-controls" *ngIf="isPlacementMode">
    <h4>Выберите корабль:</h4>
    <div class="ship-selector">
      <ion-chip 
        *ngFor="let size of [4,3,2,1]" 
        [color]="selectedShipSize === size ? 'primary' : 'medium'"
        [class.placed]="!isShipAvailable(size)"
        (click)="selectShip(size)"
        [disabled]="!isShipAvailable(size)"
      >
        <ion-icon name="boat"></ion-icon>
        <ion-label>{{size}}-палубный ({{getPlacedCount(size)}}/{{getTotalCount(size)}})</ion-label>
      </ion-chip>
    </div>
    
    <ion-button 
      fill="outline" 
      size="small" 
      (click)="toggleOrientation()"
      *ngIf="selectedShipSize"
    >
      <ion-icon slot="start" [name]="isHorizontal ? 'arrow-forward' : 'arrow-down'"></ion-icon>
      {{ isHorizontal ? 'Горизонтально' : 'Вертикально' }}
    </ion-button>
    
    <div class="ion-padding-top">
      <ion-button 
        color="success" 
        (click)="finishPlacement()"
        [disabled]="!isPlacementComplete()"
      >
        <ion-icon slot="start" name="checkmark"></ion-icon>
        В бой!
      </ion-button>
    </div>
  </div>

  <!-- Поле противника -->
  <div class="board-container">
    <h3 class="board-title">Поле Противника</h3>
    
    <!--  Индикаторы суперспособностей компьютера -->
    <div class="enemy-powers-indicator" *ngIf="enableSuperPowers && !isPlacementMode">
      <ion-chip 
        *ngFor="let power of computerSuperPowers" 
        color="dark" 
        outline 
        size="small"
        [class.ready]="power.available"
      >
        <ion-icon [name]="power.icon"></ion-icon>
      </ion-chip>
    </div>
    
    <div class="battle-grid enemy-grid" 
         [class.disabled]="isPlacementMode"
         [class.power-targeting]="isPowerActivationMode && selectedPowerForActivation?.type !== 'repair'"
    >
      <div *ngFor="let row of computerBoard; let y = index" class="grid-row">
        <div 
          *ngFor="let cell of row; let x = index"
          class="grid-cell"
          [class.hit]="cell.isHit"
          [class.miss]="cell.isMiss"
          [class.revealed]="cell.isRevealed"
          [class.power-preview]="isPowerActivationMode && selectedPowerForActivation && isValidPowerTarget(cell, selectedPowerForActivation.type)"
          (click)="handleCellClick(cell, 'computer')"
        >
          <ion-icon *ngIf="cell.isHit" name="skull" color="light"></ion-icon>
          <div *ngIf="cell.isMiss" class="miss-marker"></div>
          <!--  Индикатор суперспособности на поле -->
          <ion-icon 
            *ngIf="cell.isSuperPower && cell.superPowerType" 
            [name]="getSuperPowerIcon(cell.superPowerType)" 
            [color]="getSuperPowerColor(cell.superPowerType)"
            class="power-cell-icon"
          ></ion-icon>
        </div>
      </div>
    </div>
  </div>

  <!-- Поле игрока -->
  <div class="board-container">
    <h3 class="board-title">Ваш Флот</h3>
    
    <!--  Индикаторы суперспособностей игрока  -->
    <div class="player-powers-indicator" *ngIf="enableSuperPowers && !isPlacementMode">
      <ion-chip 
        *ngFor="let power of playerSuperPowers" 
        [color]="power.available ? power.color : 'medium'"
        size="small"
      >
        <ion-icon [name]="power.icon"></ion-icon>
      </ion-chip>
    </div>
    
    <div class="battle-grid" [class.repair-mode]="isPowerActivationMode && selectedPowerForActivation?.type === 'repair'">
      <div *ngFor="let row of playerBoard; let y = index" class="grid-row">
        <div 
          *ngFor="let cell of row; let x = index"
          class="grid-cell player-cell"
          [class.ship]="cell.hasShip"
          [class.hit]="cell.isHit"
          [class.miss]="cell.isMiss"
          [class.placement-preview]="isPlacementMode && selectedShipSize && isValidPreview(cell, x, y)"
          [class.placement-mode]="isPlacementMode"
          [class.repair-target]="isPowerActivationMode && selectedPowerForActivation?.type === 'repair' && cell.hasShip && cell.isHit"
          (click)="handleCellClick(cell, 'player')"
        >
          <ion-icon *ngIf="cell.isHit" name="flame" color="light" style="font-size: 1.5rem;"></ion-icon>
        </div>
      </div>
    </div>
  </div>

  <div class="ion-padding-top" *ngIf="gameOver">
    <ion-button expand="block" (click)="selectGameMode()">🔄 Новая игра</ion-button>
  </div>

  <!--  Подсказка при активации способности -->
  <ion-fab 
    *ngIf="isPowerActivationMode && selectedPowerForActivation" 
    vertical="bottom" 
    horizontal="end" 
    slot="fixed"
  >
    <ion-fab-button color="danger" (click)="cancelPowerActivation()">
      <ion-icon name="close"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
