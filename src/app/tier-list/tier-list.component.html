<ion-header>
  <ion-toolbar>
    <ion-title>Tier-List</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <!-- ЛЕВАЯ ПАНЕЛЬ-->
  <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
    <div 
      *ngFor="let img of sourceImages" 
      draggable="true" 
      (dragstart)="onDragStart(img)"
      style="text-align: center; cursor: grab; color: #636363; padding: 8px; border-radius: 1px; background: #1d1d1d;">
      <img [src]="img.url" style="width: 100px; height: 100px; object-fit: cover; border-radius: 1px;">
      <div style="font-weight: bold; margin-top: 5px;">{{img.label}}</div>
    </div>
  </div>


  <div class="tiers-container" style="display: flex; flex-direction: column; gap: 4px;">
    
    <!-- S  on drop - передает 
    dragover разрешение дропа в ряд 

    -->
    <div 
      (drop)="onDrop($event, 'S')"  
      (dragover)="$event.preventDefault()"
      style="display: flex; border: 2px solid #333333; border-radius: 8px; min-height: 100px;">
      <div style="width: 100px; background: #bb2f16d5; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px;color: rgb(0, 0, 0)">
        S
      </div>
  <!-- ngFor местный цикл -->      
      <div style="flex: 1; padding: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
        <div *ngFor="let item of getItemsByTier('S')" style="position: relative;">
          <img [src]="item.url" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px;">
          <ion-icon name="close-circle" 
                    (click)="removeItem(item.id)"
                    style="position: absolute; top: -8px; right: -8px; font-size: 11px; cursor: pointer; background: rgb(97, 97, 97); border-radius: 50%;color:rgb(11, 11, 46);">
          </ion-icon>
        </div>
      </div>
    </div>

    <!-- A -->

</ion-content>
